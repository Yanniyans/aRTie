<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aRTie | Global Live Tracker</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 15px; }
    h2, h3, h4 { margin: 0 0 10px 0; color: #1a1a1a; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid #e0e0e0;}
    .nav-card { cursor: pointer; position: relative; transition: border-color 0.2s;}
    .nav-card:active { border-color: #ff9800; }
    .highlight-text { font-size: 32px; font-weight: bold; text-align: center; margin: 10px 0; color: #ff9800; border-top: 2px solid #333; padding-top: 10px;}
    .arrow { position: absolute; bottom: 15px; right: 20px; font-size: 24px; font-weight: bold; color: #ff9800; }
    
    .top-nav { display: flex; gap: 10px; margin-bottom: 15px; }
    .nav-tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .nav-tab.active { background: #333; color: white; }
    
    .btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;}
    .btn-action { background: #4caf50; }
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box;}
    
    .friend-row { background: #f9f9f9; padding: 10px; border-radius: 6px; margin-bottom: 8px; border: 1px solid #eee;}
    .friend-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px;}
    .friend-btn { background: #ff9800; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer;}
    .unfriend-btn { background: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer;}
    
    /* Fare Calculator Styles */
    .fare-grid { display: flex; justify-content: space-between; align-items: center; }
    .fare-col { width: 48%; }
    .vertical-line { border-left: 2px solid #333; height: 60px; }
    
    /* Trip View Selector */
    .view-selector-box { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 2px solid #2196f3; display: flex; align-items: center; gap: 10px;}
    
    #share-banner { display: none; background: #2196f3; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; }
    .arrived-banner { background: #4caf50 !important; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { border-bottom: 2px solid #333; }
    .view { display: none; }
    .active-view { display: block; }
    .gimmick-item { padding: 8px; background: #fff3e0; border-radius: 6px; margin-bottom: 5px; font-weight: 500; }
  </style>
</head>
<body>

  <div class="top-nav">
    <div id="tab-tracker" class="nav-tab active" onclick="switchMainTab('view-home', 'tab-tracker')">🚆 Tracker</div>
    <div id="tab-friends" class="nav-tab" onclick="switchMainTab('view-friends', 'tab-friends')">👥 Friends</div>
  </div>

  <div id="view-home" class="view active-view">
    
    <div class="view-selector-box">
      <strong>Viewing:</strong>
      <select id="trip-selector" onchange="forceUIRefresh()" style="margin-bottom:0;">
        <option value="me">My Trip</option>
      </select>
    </div>

    <div id="share-banner">👀 Viewing Trip!</div>

    <div class="card nav-card" onclick="switchDetail('view-cars')">
      <h3>least occupied car:</h3>
      <div class="highlight-text" id="main-occ">Loading...</div>
      <div class="arrow">&rarr;</div>
    </div>

    <div class="card">
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <select id="ticket-type" onchange="calculateFare()" style="flex: 1;">
          <option value="beep">Stored Value</option>
          <option value="sj">Single Journey</option>
        </select>
        <select id="discount-type" onchange="calculateFare()" style="flex: 1;">
          <option value="reg">Regular Fare</option>
          <option value="disc">50% Discount</option>
        </select>
      </div>
      <div class="fare-grid">
        <div class="fare-col">
          <label>Starting:</label>
          <select id="start-station" onchange="calculateFare()">
            <option value="0">Recto</option><option value="1">Legarda</option>
            <option value="2">Pureza</option><option value="3">V. Mapa</option>
            <option value="4">J. Ruiz</option><option value="5">Gilmore</option>
            <option value="6">Betty Go</option><option value="7">Cubao</option>
            <option value="8">Anonas</option><option value="9">Katipunan</option>
            <option value="10">Santolan</option><option value="11">Marikina</option>
            <option value="12">Antipolo</option>
          </select>
          <label>Ending:</label>
          <select id="end-station" onchange="calculateFare()">
            <option value="0">Recto</option><option value="1">Legarda</option>
            <option value="2">Pureza</option><option value="3">V. Mapa</option>
            <option value="4">J. Ruiz</option><option value="5">Gilmore</option>
            <option value="6">Betty Go</option><option value="7" selected>Cubao</option>
            <option value="8">Anonas</option><option value="9">Katipunan</option>
            <option value="10">Santolan</option><option value="11">Marikina</option>
            <option value="12">Antipolo</option>
          </select>
        </div>
        <div class="vertical-line"></div>
        <div class="fare-col" style="text-align: center;">
          <h3>Price:</h3>
          <h2 id="fare-price" style="color: #4caf50; margin:0;">--</h2>
        </div>
      </div>
    </div>

    <div class="card nav-card" onclick="switchDetail('view-history')">
      <h4 id="main-prev-label">Left &lt;Prev. Station&gt;:</h4>
      <div class="highlight-text" style="font-size: 28px; color: #333;" id="prev-station-time">--:-- --</div>
      <div class="arrow">&rarr;</div>
    </div>

    <div class="card">
      <h3 id="gimmick-title">Nearby Spots:</h3>
      <div id="gimmick-list">
        <div class="gimmick-item">Loading local spots...</div>
      </div>
    </div>
  </div>

  <div id="view-friends" class="view">
    <div class="card" style="text-align: center;">
      <h3>Your aRTie ID</h3>
      <h1 id="my-id-display" style="color: #ff9800; font-size: 48px; margin: 10px 0;">----</h1>
      <p style="margin: 0; color: #666; font-size: 14px;">Give this code to friends so they can add you.</p>
    </div>

    <div class="card">
      <h3>Add a Friend</h3>
      <div class="input-row">
        <input type="text" id="friend-name-input" placeholder="Name (e.g. Ben)">
        <input type="number" id="friend-id-input" placeholder="4-Digit ID" maxlength="4">
      </div>
      <button class="btn btn-action" onclick="addFriend()">➕ Add Friend</button>
    </div>

    <div class="card">
      <h3>My Friends</h3>
      <div id="friends-list-container"></div>
    </div>
  </div>

  <div id="view-cars" class="view">
    <button class="btn" onclick="switchDetail('view-home')">&larr; Back</button>
    <div class="card">
      <table id="cars-table">
        <tr><th>Other cars</th><th>capacity</th></tr>
      </table>
    </div>
  </div>

  <div id="view-history" class="view">
    <button class="btn" onclick="switchDetail('view-home')">&larr; Back</button>
    <div class="card">
      <table id="history-table">
        <tr><th>station name</th><th>time</th></tr>
      </table>
    </div>
  </div>

  <script>
    // System Setup
    let myId = localStorage.getItem("artie_id");
    if (!myId) {
      myId = Math.floor(1000 + Math.random() * 9000).toString(); 
      localStorage.setItem("artie_id", myId);
    }
    document.getElementById("my-id-display").innerText = myId;

    let friends = JSON.parse(localStorage.getItem("artie_friends_v2") || "[]");
    let currentGlobalData = null; 

    // --- FARE CALCULATOR LOGIC ---
    const fareMatrix = [
      [13, 15, 16, 18, 19, 21, 22, 23, 25, 26, 28, 31, 33],
      [15, 13, 15, 17, 18, 19, 21, 22, 24, 25, 27, 29, 32],
      [16, 15, 13, 15, 16, 18, 19, 20, 22, 23, 26, 28, 30],
      [18, 17, 15, 13, 15, 16, 17, 19, 20, 22, 24, 26, 29],
      [19, 18, 16, 15, 13, 14, 16, 17, 19, 20, 22, 24, 27],
      [21, 19, 18, 16, 14, 13, 15, 16, 18, 19, 21, 23, 26],
      [22, 21, 19, 17, 16, 15, 13, 15, 16, 18, 20, 22, 25],
      [23, 22, 20, 19, 17, 16, 15, 13, 15, 16, 19, 21, 23],
      [25, 24, 22, 20, 19, 18, 16, 15, 13, 14, 17, 19, 22],
      [26, 25, 23, 22, 20, 19, 18, 16, 14, 13, 16, 18, 21],
      [28, 27, 26, 24, 22, 21, 20, 19, 17, 16, 13, 15, 18],
      [31, 29, 28, 26, 24, 23, 22, 21, 19, 18, 15, 13, 16],
      [33, 32, 30, 29, 27, 26, 25, 23, 22, 21, 18, 16, 13]
    ];

    function calculateFare() {
      let start = parseInt(document.getElementById('start-station').value);
      let end = parseInt(document.getElementById('end-station').value);
      let isSingleJourney = document.getElementById('ticket-type').value === "sj";
      let isDiscounted = document.getElementById('discount-type').value === "disc";
      let priceDisplay = document.getElementById('fare-price');

      if (start === end) {
        priceDisplay.innerText = "0";
      } else {
        let svReg = fareMatrix[start][end];
        let finalFare = svReg;
        if (isSingleJourney) finalFare = Math.ceil(svReg / 5) * 5;
        if (isDiscounted) finalFare = isSingleJourney ? Math.round(finalFare / 2) : (finalFare / 2).toFixed(2);
        priceDisplay.innerHTML = "&#8369;" + finalFare;
      }
    }
    calculateFare(); // Run once on load

    // --- FRIENDS UI ---
    const stationsList = ["Recto", "Legarda", "Pureza", "V. Mapa", "J. Ruiz", "Gilmore", "Betty Go", "Cubao", "Anonas", "Katipunan", "Santolan", "Marikina", "Antipolo"];
    let stationOptions = "";
    stationsList.forEach(s => stationOptions += `<option value="${s}">${s}</option>`);

    function renderFriends() {
      let html = "";
      if (friends.length === 0) {
        html = "<p style='color:#888; font-style:italic;'>No friends added yet.</p>";
      } else {
        friends.forEach(f => {
          html += `<div class="friend-row">
                    <div style="display:flex; justify-content:space-between;">
                      <div><strong style="font-size: 18px;">${f.name}</strong> <span style="color:#666; font-size: 12px;">ID: ${f.id}</span></div>
                      <button class="unfriend-btn" onclick="removeFriend('${f.id}')">❌</button>
                    </div>
                    
                    <div class="friend-actions">
                      <select id="car-select-${f.id}" style="width: 30%; margin:0;"><option value="1">Car 1</option><option value="2">Car 2</option><option value="3">Car 3</option></select>
                      <select id="dest-select-${f.id}" style="width: 40%; margin:0;">${stationOptions}</select>
                      <button class="friend-btn" onclick="broadcastTrip('${f.id}')">📡 Send</button>
                    </div>
                   </div>`;
        });
      }
      document.getElementById("friends-list-container").innerHTML = html;
    }
    renderFriends();

    function addFriend() {
      let newId = document.getElementById("friend-id-input").value;
      let newName = document.getElementById("friend-name-input").value || "Friend";
      if (newId.length === 4 && newId !== myId && !friends.find(f => f.id === newId)) {
        friends.push({id: newId, name: newName});
        localStorage.setItem("artie_friends_v2", JSON.stringify(friends));
        document.getElementById("friend-id-input").value = "";
        document.getElementById("friend-name-input").value = "";
        renderFriends();
      } else { alert("Invalid or duplicate ID."); }
    }

    function removeFriend(id) {
      if(confirm("Remove this friend?")) {
        friends = friends.filter(f => f.id !== id);
        localStorage.setItem("artie_friends_v2", JSON.stringify(friends));
        renderFriends();
      }
    }

    function switchMainTab(viewId, tabId) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      document.getElementById(viewId).classList.add('active-view');
      document.getElementById(tabId).classList.add('active');
    }
    function switchDetail(viewId) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view'));
      document.getElementById(viewId).classList.add('active-view');
    }

    // --- DATA & CLOUD SYNC ---
    const gimmicks = {
      "Katipunan": ["📍 Pop Up Katipunan", "🛍️ UP Town Center", "📚 Ateneo Art Gallery"],
      "Cubao": ["🛍️ Ali Mall", "🍻 Cubao Expo", "🎨 Art in Island"],
      "Legarda": ["☕️ Local Cafes", "🏛️ National Museum"],
      "Default": ["🏪 Convenience Store", "☕️ Nearby Coffee Shop"]
    };

    const scriptBaseURL = "https://script.google.com/macros/s/AKfycbxcPJfHKZYBLjKcnLur200nKnv3IPJYKftf_9PWq2UkV8fo4jzYrJTrV7PFLqCJ6Yaa/exec";

    function broadcastTrip(friendId) {
      let car = document.getElementById(`car-select-${friendId}`).value;
      let dest = document.getElementById(`dest-select-${friendId}`).value;
      
      fetch(`${scriptBaseURL}?action=share&from=${myId}&to=${friendId}&car=${car}&dest=${dest}`, { mode: 'no-cors' })
        .then(() => alert(`Trip details sent to ${friendId}!`))
        .catch(err => alert("Error connecting."));
    }

    function forceUIRefresh() {
      if(currentGlobalData) updateUI(currentGlobalData);
    }

    function updateUI(data) {
      let selector = document.getElementById("trip-selector");
      let selectedView = selector.value; 

      let optionsHtml = `<option value="me">My Trip</option>`;
      if (data.activeShares) {
        Object.keys(data.activeShares).forEach(friendId => {
          let friendObj = friends.find(f => f.id == friendId);
          let name = friendObj ? friendObj.name : "ID " + friendId;
          optionsHtml += `<option value="${friendId}">${name}'s Trip</option>`;
        });
      }
      selector.innerHTML = optionsHtml;
      
      if (selectedView === "me" || data.activeShares[selectedView]) {
        selector.value = selectedView;
      } else {
        selectedView = "me"; 
        selector.value = "me";
      }

      let banner = document.getElementById("share-banner");
      let bestText = data.bestCarName + " : " + data.bestCarOcc + "% full";
      let stationName = data.currentStation;

      if (selectedView === "me") {
        banner.style.display = "none";
        banner.className = "";
        document.getElementById('main-occ').innerText = bestText;
      } else {
        let shareInfo = data.activeShares[selectedView];
        let friendObj = friends.find(f => f.id == selectedView);
        let name = friendObj ? friendObj.name : "Friend";
        
        banner.style.display = "block";
        
        if (data.currentStation === shareInfo.dest) {
          banner.className = "arrived-banner";
          banner.innerText = `🎉 ${name} arrived at ${shareInfo.dest}!`;
          document.getElementById('main-occ').innerText = `Trip Complete`;
          document.getElementById('main-occ').style.color = "#4caf50";
        } else {
          banner.className = "";
          banner.innerText = `👀 Viewing ${name}'s Trip (Car ${shareInfo.car} to ${shareInfo.dest})`;
          
          let friendCarOcc = data.allCars[shareInfo.car - 1]; 
          document.getElementById('main-occ').innerText = `Car ${shareInfo.car} : ${friendCarOcc}% full`;
          
          let mainOcc = document.getElementById('main-occ');
          if(friendCarOcc < 50) mainOcc.style.color = "#4caf50";
          else if(friendCarOcc < 80) mainOcc.style.color = "#ffeb3b";
          else mainOcc.style.color = "#f44336";
        }
      }

      document.getElementById('main-prev-label').innerText = "Left " + stationName + ":";
      document.getElementById('prev-station-time').innerText = data.currentTime;
      
      document.getElementById('gimmick-title').innerText = "Spots near " + stationName + ":";
      let spots = gimmicks[stationName] || gimmicks["Default"];
      let spotsHtml = "";
      for(let i=0; i < spots.length; i++) spotsHtml += "<div class='gimmick-item'>" + spots[i] + "</div>";
      document.getElementById('gimmick-list').innerHTML = spotsHtml;

      let carsHtml = "<tr><th>Other cars</th><th>capacity</th></tr>";
      for(let i=0; i < data.allCars.length; i++) {
        let isBest = (selectedView === "me" && data.allCars[i] === data.bestCarOcc) || (selectedView !== "me" && i+1 == data.activeShares[selectedView]?.car) ? "style='color: #4caf50; font-weight:bold;'" : "";
        let label = (selectedView !== "me" && i+1 == data.activeShares[selectedView]?.car) ? "★" : "";
        carsHtml += `<tr><td>Car ${i+1} ${label}</td><td ${isBest}>${data.allCars[i]}%</td></tr>`;
      }
      document.getElementById('cars-table').innerHTML = carsHtml;
    }

    function fetchTrainData() {
      fetch(`${scriptBaseURL}?action=read&myId=${myId}`)
        .then(response => response.json())
        .then(data => {
          if(!data.error) {
            currentGlobalData = data;
            updateUI(data);
          }
        }).catch(err => console.error('Fetch error:', err));
    }

    fetchTrainData();
    setInterval(fetchTrainData, 5000);
  </script>
</body>
</html>
