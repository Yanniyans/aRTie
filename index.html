<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>aRTie | Global Live Tracker</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 15px; }
    h2, h3, h4 { margin: 0 0 10px 0; color: #1a1a1a; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 2px solid #e0e0e0;}
    .nav-card { cursor: pointer; position: relative; transition: border-color 0.2s;}
    .nav-card:active { border-color: #ff9800; }
    .highlight-text { font-size: 32px; font-weight: bold; text-align: center; margin: 10px 0; color: #ff9800; border-top: 2px solid #333; padding-top: 10px;}
    .arrow { position: absolute; bottom: 15px; right: 20px; font-size: 24px; font-weight: bold; color: #ff9800; }
    
    .top-nav { display: flex; gap: 10px; margin-bottom: 15px; }
    .nav-tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .nav-tab.active { background: #333; color: white; }
    
    .btn { background: #333; color: white; border: none; padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; font-size: 16px; width: 100%; font-weight: bold;}
    .btn-action { background: #4caf50; }
    .input-row { display: flex; gap: 10px; margin-bottom: 10px; }
    input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; width: 100%; box-sizing: border-box;}
    
    .friend-row { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 12px; border: 1px solid #e0e0e0;}
    .unfriend-btn { background: #f44336; color: white; border: none; padding: 6px 10px; border-radius: 6px; font-weight: bold; cursor: pointer;}
    .broadcast-box { background: #eeeeee; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid #ddd;}
    
    .fare-grid { display: flex; justify-content: space-between; align-items: center; }
    .fare-col { width: 48%; }
    .vertical-line { border-left: 2px solid #333; height: 60px; }
    
    .view-selector-box { background: #e3f2fd; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 2px solid #2196f3; display: flex; align-items: center; gap: 10px;}
    
    #share-banner { display: none; background: #2196f3; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold; }
    .arrived-banner { background: #4caf50 !important; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { border-bottom: 2px solid #333; }
    .view { display: none; }
    .active-view { display: block; }
    
    /* Gimmick Categories */
    .cat-title { font-size: 14px; font-weight: bold; color: #555; margin-top: 12px; margin-bottom: 6px; border-bottom: 1px solid #ddd; padding-bottom: 4px; text-transform: uppercase;}
    .gimmick-item { padding: 8px; background: #fff3e0; border-radius: 6px; margin-bottom: 5px; font-weight: 500; font-size: 14px;}
  </style>
</head>
<body>

  <div class="top-nav">
    <div id="tab-tracker" class="nav-tab active" onclick="switchMainTab('view-home', 'tab-tracker')">🚆 Tracker</div>
    <div id="tab-friends" class="nav-tab" onclick="switchMainTab('view-friends', 'tab-friends')">👥 Friends</div>
  </div>

  <div id="view-home" class="view active-view">
    
    <div class="view-selector-box">
      <strong>Viewing:</strong>
      <select id="trip-selector" onchange="forceUIRefresh()" style="margin-bottom:0;">
        <option value="me">My Trip</option>
      </select>
    </div>

    <div id="share-banner">Viewing Trip!</div>

    <button id="stop-broadcast-btn" class="unfriend-btn" style="display:none; width:100%; margin-bottom:15px; font-size:16px; padding:12px;" onclick="stopMyBroadcast()">🛑 Stop Broadcasting My Trip</button>
    <button id="stop-following-btn" class="unfriend-btn" style="display:none; width:100%; margin-bottom:15px; font-size:16px; padding:12px; background-color: #ff9800;" onclick="stopFollowingFriend()">🛑 Stop Following Friend's Trip</button>

    <div class="card nav-card" onclick="switchDetail('view-cars')">
      <h3>least occupied car:</h3>
      <div class="highlight-text" id="main-occ">Loading...</div>
      <div class="arrow">&rarr;</div>
    </div>

    <div class="card">
      <div style="display: flex; gap: 10px; margin-bottom: 15px;">
        <select id="ticket-type" onchange="calculateFare()" style="flex: 1;">
          <option value="beep">Stored Value</option>
          <option value="sj">Single Journey</option>
        </select>
        <select id="discount-type" onchange="calculateFare()" style="flex: 1;">
          <option value="reg">Regular Fare</option>
          <option value="disc">50% Discount</option>
        </select>
      </div>
      <div class="fare-grid">
        <div class="fare-col">
          <label>Starting:</label>
          <select id="start-station" onchange="calculateFare()">
            <option value="0">Recto</option><option value="1">Legarda</option><option value="2">Pureza</option><option value="3">V. Mapa</option><option value="4">J. Ruiz</option><option value="5">Gilmore</option><option value="6">Betty Go</option><option value="7">Cubao</option><option value="8">Anonas</option><option value="9">Katipunan</option><option value="10">Santolan</option><option value="11">Marikina</option><option value="12">Antipolo</option>
          </select>
          <label>Ending:</label>
          <select id="end-station" onchange="calculateFare()">
            <option value="0">Recto</option><option value="1">Legarda</option><option value="2">Pureza</option><option value="3">V. Mapa</option><option value="4">J. Ruiz</option><option value="5">Gilmore</option><option value="6">Betty Go</option><option value="7" selected>Cubao</option><option value="8">Anonas</option><option value="9">Katipunan</option><option value="10">Santolan</option><option value="11">Marikina</option><option value="12">Antipolo</option>
          </select>
        </div>
        <div class="vertical-line"></div>
        <div class="fare-col" style="text-align: center;">
          <h3>Price:</h3>
          <h2 id="fare-price" style="color: #4caf50; margin:0;">--</h2>
        </div>
      </div>
    </div>

    <div class="card nav-card" onclick="switchDetail('view-history')">
      <h4 id="main-prev-label">Left &lt;Prev. Station&gt;:</h4>
      <div class="highlight-text" style="font-size: 28px; color: #333;" id="prev-station-time">--:-- --</div>
      <div class="arrow">&rarr;</div>
    </div>

    <div class="card">
      <h3 id="gimmick-title">Nearby Spots:</h3>
      <div id="gimmick-list">
        <div class="gimmick-item">Loading local spots...</div>
      </div>
    </div>
  </div>

  <div id="view-friends" class="view">
    <div class="card" style="text-align: center;">
      <h3>Your aRTie ID</h3>
      <h1 id="my-id-display" style="color: #ff9800; font-size: 48px; margin: 10px 0;">----</h1>
      <p style="margin: 0; color: #666; font-size: 14px;">Give this code to friends so they can add you.</p>
    </div>
    <div class="card">
      <h3>Add a Friend</h3>
      <div class="input-row">
        <input type="text" id="friend-name-input" placeholder="Name (e.g. Paul)">
        <input type="number" id="friend-id-input" placeholder="4-Digit ID" maxlength="4">
      </div>
      <button class="btn btn-action" onclick="addFriend()">➕ Add Friend</button>
    </div>
    <div class="card">
      <h3>My Friends</h3>
      <div id="friends-list-container"></div>
    </div>
  </div>

  <div id="view-cars" class="view">
    <button class="btn" onclick="switchDetail('view-home')">&larr; Back</button>
    <div class="card"><table id="cars-table"><tr><th>Other cars</th><th>capacity</th></tr></table></div>
  </div>
  <div id="view-history" class="view">
    <button class="btn" onclick="switchDetail('view-home')">&larr; Back</button>
    <div class="card"><table id="history-table"><tr><th>station name</th><th>time</th></tr></table></div>
  </div>

  <script>
    let myId = localStorage.getItem("artie_id");
    if (!myId) {
      myId = Math.floor(1000 + Math.random() * 9000).toString(); 
      localStorage.setItem("artie_id", myId);
    }
    document.getElementById("my-id-display").innerText = myId;

    let friends = JSON.parse(localStorage.getItem("artie_friends_v2") || "[]");
    let currentGlobalData = null; 
    let knownShares = []; 

    // --- FARE CALCULATOR ---
    const fareMatrix = [
      [13, 15, 16, 18, 19, 21, 22, 23, 25, 26, 28, 31, 33], [15, 13, 15, 17, 18, 19, 21, 22, 24, 25, 27, 29, 32], [16, 15, 13, 15, 16, 18, 19, 20, 22, 23, 26, 28, 30],
      [18, 17, 15, 13, 15, 16, 17, 19, 20, 22, 24, 26, 29], [19, 18, 16, 15, 13, 14, 16, 17, 19, 20, 22, 24, 27], [21, 19, 18, 16, 14, 13, 15, 16, 18, 19, 21, 23, 26],
      [22, 21, 19, 17, 16, 15, 13, 15, 16, 18, 20, 22, 25], [23, 22, 20, 19, 17, 16, 15, 13, 15, 16, 19, 21, 23], [25, 24, 22, 20, 19, 18, 16, 15, 13, 14, 17, 19, 22],
      [26, 25, 23, 22, 20, 19, 18, 16, 14, 13, 16, 18, 21], [28, 27, 26, 24, 22, 21, 20, 19, 17, 16, 13, 15, 18], [31, 29, 28, 26, 24, 23, 22, 21, 19, 18, 15, 13, 16],
      [33, 32, 30, 29, 27, 26, 25, 23, 22, 21, 18, 16, 13]
    ];

    function calculateFare() {
      let start = parseInt(document.getElementById('start-station').value); let end = parseInt(document.getElementById('end-station').value);
      let isSingleJourney = document.getElementById('ticket-type').value === "sj"; let isDiscounted = document.getElementById('discount-type').value === "disc";
      if (start === end) { document.getElementById('fare-price').innerText = "0"; } else {
        let finalFare = fareMatrix[start][end];
        if (isSingleJourney) finalFare = Math.ceil(finalFare / 5) * 5;
        if (isDiscounted) finalFare = isSingleJourney ? Math.round(finalFare / 2) : (finalFare / 2).toFixed(2);
        document.getElementById('fare-price').innerHTML = "&#8369;" + finalFare;
      }
    }
    calculateFare();

    // --- FRIENDS UI ---
    const stationsList = ["Recto", "Legarda", "Pureza", "V. Mapa", "J. Ruiz", "Gilmore", "Betty Go", "Cubao", "Anonas", "Katipunan", "Santolan", "Marikina", "Antipolo"];
    let stationOptions = "";
    stationsList.forEach(s => stationOptions += `<option value="${s}">${s}</option>`);

    function renderFriends() {
      let html = "";
      if (friends.length === 0) { html = "<p style='color:#888; font-style:italic;'>No friends added yet.</p>"; } else {
        friends.forEach(f => {
          html += `
            <div class="friend-row">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <div><strong style="font-size: 20px;">${f.name}</strong> <span style="color:#666; font-size: 14px;">(ID: ${f.id})</span></div>
                <button class="unfriend-btn" onclick="removeFriend('${f.id}')" title="Remove Friend"></button>
              </div>
              
              <div class="broadcast-box">
                <div style="font-size: 13px; color: #444; margin-bottom: 8px; font-weight: bold; text-transform: uppercase;">
                  ▶ When I broadcast, I'll be in:
                </div>
                <div style="display: flex; gap: 8px; align-items: center; margin-bottom: 12px;">
                  <select id="car-select-${f.id}" style="flex: 1; margin:0;"><option value="1">Car 1</option><option value="2">Car 2</option><option value="3">Car 3</option></select>
                  <span style="font-size: 13px; color: #666; font-weight: bold;"> going to </span>
                  <select id="dest-select-${f.id}" style="flex: 1.5; margin:0;">${stationOptions}</select>
                </div>
                <button class="btn btn-action" style="margin:0;" onclick="startBroadcast('${f.id}')">📡 Broadcast Trip to ${f.name}</button>
              </div>
            </div>`;
        });
      }
      document.getElementById("friends-list-container").innerHTML = html;
    }
    renderFriends();

    function addFriend() {
      let newId = document.getElementById("friend-id-input").value; let newName = document.getElementById("friend-name-input").value || "Friend";
      if (newId.length === 4 && newId !== myId && !friends.find(f => f.id === newId)) {
        friends.push({id: newId, name: newName}); localStorage.setItem("artie_friends_v2", JSON.stringify(friends));
        document.getElementById("friend-id-input").value = ""; document.getElementById("friend-name-input").value = ""; renderFriends();
      } else { alert("Invalid or duplicate ID."); }
    }
    function removeFriend(id) { if(confirm("Remove this friend?")) { friends = friends.filter(f => f.id !== id); localStorage.setItem("artie_friends_v2", JSON.stringify(friends)); renderFriends(); } }

    function switchMainTab(viewId, tabId) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view'));
      document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
      document.getElementById(viewId).classList.add('active-view'); document.getElementById(tabId).classList.add('active');
    }
    function switchDetail(viewId) { document.querySelectorAll('.view').forEach(el => el.classList.remove('active-view')); document.getElementById(viewId).classList.add('active-view'); }

    // --- CATEGORIZED GIMMICKS DICTIONARY ---
    const gimmicks = {
      "Katipunan": { 
        eat: ["Pop Up", "Gino's Brick Oven Pizza"], 
        ent: ["Ateneo Art Gallery", "UP Sunken Garden"], 
        edu: ["Ateneo", "UP Diliman", "Miriam"], 
        mall: ["UP Town Center", "SM Marikina (via trike)"],
        church: ["Santa Maria della Strada Parish", "Church of the Gesu"],
        other: ["Tricycle Terminal"] 
      },
      "Cubao": { 
        eat: ["Bellini's", "Cubao Expo"], 
        ent: ["Art in Island", "Smart Araneta Coliseum"], 
        edu: ["TIP Cubao"], 
        mall: ["Gateway Mall", "Ali Mall", "Farmers Plaza"],
        church: ["Our Lady of Perpetual Help", "Christ the King"],
        other: ["Bus Terminal"] 
      },
      "Legarda": { 
        eat: ["Cafe UK"], 
        ent: ["National Museum"], 
        edu: ["San Beda", "CEU", "Arellano"], 
        mall: ["SM Manila (nearby)", "Isetann Recto"],
        church: ["San Sebastian Church", "Quiapo Church"],
        other: ["Recto Bookstores"] 
      },
      "Default": { 
        eat: ["Food"], 
        ent: ["Entertainment"], 
        edu: ["School"], 
        mall: ["Nearby Mall"],
        church: ["Nearby Church"],
        other: ["7/11"] 
      }
    };

    // Make sure this URL is correct!
    const scriptBaseURL = "https://script.google.com/macros/s/AKfycbz3WijVbgnh2oOvZduBKIWZsU-BoHgHCQRtcGyLcSYJKSYmdACJCrCiBLXNl5FD7mu5/exec";

    // --- BROADCAST CONTROLS ---
    function startBroadcast(friendId) {
      let car = document.getElementById(`car-select-${friendId}`).value; let dest = document.getElementById(`dest-select-${friendId}`).value;
      
      fetch(`${scriptBaseURL}?action=share&from=${myId}&to=${friendId}&car=${car}&dest=${dest}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            alert(`Trip details safely logged to cloud! Broadcasting to ${friendId}.`);
            document.getElementById("stop-broadcast-btn").style.display = "block";
          }
        }).catch(err => alert("Error syncing. Did you remember to deploy the NEW VERSION of your Google Script?"));
    }

    function stopMyBroadcast() {
      fetch(`${scriptBaseURL}?action=stop_share&from=${myId}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            alert("Broadcast turned off successfully.");
            document.getElementById("stop-broadcast-btn").style.display = "none";
          }
        }).catch(err => alert("Error connecting."));
    }

    // --- NEW: STOP FOLLOWING FUNCTION ---
    function stopFollowingFriend() {
      fetch(`${scriptBaseURL}?action=stop_share&myId=${myId}`)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            alert("You have stopped following the broadcast.");
            document.getElementById("trip-selector").value = "me";
            forceUIRefresh();
          }
        }).catch(err => alert("Error connecting."));
    }

    function dismissFriendTrip() { document.getElementById("trip-selector").value = "me"; forceUIRefresh(); }
    function forceUIRefresh() { if(currentGlobalData) updateUI(currentGlobalData); }

    function updateUI(data) {
      if (data.activeShares) {
        Object.keys(data.activeShares).forEach(friendId => {
          if (!knownShares.includes(friendId)) {
            let fObj = friends.find(f => f.id == friendId); let n = fObj ? fObj.name : "ID " + friendId;
            alert(`🔔 ${n} just started sharing their trip with you!`);
            knownShares.push(friendId);
          }
        });
        knownShares = knownShares.filter(id => data.activeShares[id]);
      } else { knownShares = []; }

      let selector = document.getElementById("trip-selector"); let selectedView = selector.value; 

      let optionsHtml = `<option value="me">My Trip</option>`;
      if (data.activeShares) {
        Object.keys(data.activeShares).forEach(friendId => {
          let friendObj = friends.find(f => f.id == friendId); let name = friendObj ? friendObj.name : "ID " + friendId;
          optionsHtml += `<option value="${friendId}">${name}'s Trip</option>`;
        });
      }
      selector.innerHTML = optionsHtml;
      
      if (selectedView === "me" || (data.activeShares && data.activeShares[selectedView])) { selector.value = selectedView; } 
      else { selectedView = "me"; selector.value = "me"; }

      let banner = document.getElementById("share-banner");
      let bestText = data.bestCarName + " : " + data.bestCarOcc + "% full";
      let stationName = data.currentStation;

      // --- NEW LOGIC: SHOW/HIDE STOP FOLLOWING BUTTON ---
      if (selectedView === "me") {
        banner.style.display = "none"; banner.className = ""; document.getElementById('main-occ').innerText = bestText;
        document.getElementById('stop-following-btn').style.display = 'none'; // Hide when viewing own trip
      } else {
        let shareInfo = data.activeShares[selectedView];
        let friendObj = friends.find(f => f.id == selectedView); let name = friendObj ? friendObj.name : "Friend";
        
        banner.style.display = "block";
        if (data.currentStation === shareInfo.dest) {
          banner.className = "arrived-banner";
          banner.innerHTML = `🎉 ${name} arrived at ${shareInfo.dest}! <button onclick="dismissFriendTrip()" style="margin-left: 10px; padding: 6px 12px; border-radius: 6px; border: none; background: white; color: #4caf50; font-weight: bold; cursor: pointer;">Dismiss</button>`;
          document.getElementById('main-occ').innerText = `Trip Complete`; document.getElementById('main-occ').style.color = "#4caf50";
          document.getElementById('stop-following-btn').style.display = 'none'; // Hide if arrived
        } else {
          banner.className = ""; banner.innerText = `👀 Viewing ${name}'s Trip (Car ${shareInfo.car} to ${shareInfo.dest})`;
          let friendCarOcc = data.allCars[shareInfo.car - 1]; 
          document.getElementById('main-occ').innerText = `Car ${shareInfo.car} : ${friendCarOcc}% full`;
          
          let mainOcc = document.getElementById('main-occ');
          if(friendCarOcc < 50) mainOcc.style.color = "#4caf50"; else if(friendCarOcc < 80) mainOcc.style.color = "#ffeb3b"; else mainOcc.style.color = "#f44336";
          document.getElementById('stop-following-btn').style.display = 'block'; // Show when following
        }
      }

      document.getElementById('main-prev-label').innerText = "Left " + stationName + ":";
      document.getElementById('prev-station-time').innerText = data.currentTime;
      
      document.getElementById('gimmick-title').innerText = "Spots near " + stationName + ":";
      let spots = gimmicks[stationName] || gimmicks["Default"]; 
      let spotsHtml = ""; 
              
      if (spots.eat && spots.eat.length > 0) spotsHtml += '<div class="cat-title">Places to Eat</div>' + spots.eat.map(s => `<div class='gimmick-item'>${s}</div>`).join(''); 
      if (spots.ent && spots.ent.length > 0) spotsHtml += '<div class="cat-title">Places to Go</div>' + spots.ent.map(s => `<div class='gimmick-item'>${s}</div>`).join(''); 
      if (spots.edu && spots.edu.length > 0) spotsHtml += '<div class="cat-title">Schools</div>' + spots.edu.map(s => `<div class='gimmick-item'>${s}</div>`).join(''); 
      if (spots.mall && spots.mall.length > 0) spotsHtml += '<div class="cat-title">Malls</div>' + spots.mall.map(s => `<div class='gimmick-item'>${s}</div>`).join(''); 
      if (spots.church && spots.church.length > 0) spotsHtml += '<div class="cat-title">Churches</div>' + spots.church.map(s => `<div class='gimmick-item'>${s}</div>`).join(''); 
      if (spots.other && spots.other.length > 0) spotsHtml += '<div class="cat-title">Others</div>' + spots.other.map(s => `<div class='gimmick-item'>${s}</div>`).join(''); 
      
      document.getElementById('gimmick-list').innerHTML = spotsHtml;

      let carsHtml = "<tr><th>Other cars</th><th>capacity</th></tr>";
      for(let i=0; i < data.allCars.length; i++) {
        let isBest = (selectedView === "me" && data.allCars[i] === data.bestCarOcc) || (selectedView !== "me" && i+1 == data.activeShares[selectedView]?.car) ? "style='color: #4caf50; font-weight:bold;'" : "";
        let label = (selectedView !== "me" && i+1 == data.activeShares[selectedView]?.car) ? "★" : "";
        carsHtml += `<tr><td>Car ${i+1} ${label}</td><td ${isBest}>${data.allCars[i]}%</td></tr>`;
      }
      document.getElementById('cars-table').innerHTML = carsHtml;
    }

    function fetchTrainData() {
      fetch(`${scriptBaseURL}?action=read&myId=${myId}`).then(r => r.json()).then(data => { if(!data.error) { currentGlobalData = data; updateUI(data); } }).catch(e => console.log(e));
    }
    fetchTrainData(); setInterval(fetchTrainData, 5000);
  </script>
</body>
</html>
